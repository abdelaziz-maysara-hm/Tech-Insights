[build]
  base = "."
  publish = "artifacts/techpulse-ar/dist/public"
  functions = "artifacts/techpulse-ar/netlify/functions"
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/techpulse-ar run build"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
