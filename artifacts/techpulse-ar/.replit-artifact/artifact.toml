kind = "web"
previewPath = "/"
title = "TechPulse - موقع تقني"
version = "1.0.0"
id = "artifacts/techpulse-ar"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19818

[services.development]
run = "pnpm --filter @workspace/techpulse-ar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/techpulse-ar", "run", "build" ]
serve = "static"
publicDir = "artifacts/techpulse-ar/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19818"
BASE_PATH = "/"
